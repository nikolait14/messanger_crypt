name: messenger

services:
  postgres:
    image: postgres:16-alpine
    container_name: messenger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-messenger}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: messenger-gateway
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      GATEWAY_PORT: "8080"
      AUTH_GRPC_ADDR: auth:9001
      USER_GRPC_ADDR: user:9002
      MESSAGE_GRPC_ADDR: message:9003
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      user:
        condition: service_started
      message:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/v1/healthz >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: messenger-auth
    restart: unless-stopped
    environment:
      AUTH_GRPC_PORT: "9001"
      DATABASE_URL: postgres://messenger:messenger@postgres:5432/messenger?sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-60m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_GRPC_PORT:-9001}:9001"

  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: messenger-user
    restart: unless-stopped
    environment:
      USER_GRPC_PORT: "9002"
      DATABASE_URL: postgres://messenger:messenger@postgres:5432/messenger?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${USER_GRPC_PORT:-9002}:9002"

  message:
    build:
      context: .
      dockerfile: services/message/Dockerfile
    container_name: messenger-message
    restart: unless-stopped
    environment:
      MESSAGE_GRPC_PORT: "9003"
      DATABASE_URL: postgres://messenger:messenger@postgres:5432/messenger?sslmode=disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MESSAGE_GRPC_PORT:-9003}:9003"

volumes:
  postgres_data:
